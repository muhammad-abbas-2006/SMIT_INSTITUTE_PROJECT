<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .navbar-brand {
      font-size: 50px;
    }
    .main {
      display: flex;
      justify-content: space-between; /* logout right side */
      align-items: center;
      width: 100%;
      padding: 0 20px;
    }
    .additems{
        display: flex;
        justify-content: center;
        margin-top: 2%;
    }
    .main-btn{
        border: 1px solid black;
        background-color: gainsboro;
        width: 50%;
        font-size: x-large;
    }
    .main-card{
        display: flex;
        justify-content: space-evenly;
    }
  </style>
</head>
<body>

<!-- navbar work start  -->

  <nav class="navbar bg-body-tertiary">
    <div class="main">
      <div>
        <a class="navbar-brand" href="#">Authentication With SupaBase</a>
      </div>
      <div>
        <button id="btn-logout" class="btn btn-danger">Logout</button>
      </div>
    </div>
  </nav>

<!-- modal work is start -->

<div class="additems">
  <button type="button" id="addItem" class="main-btn btn btn-tertiary" data-bs-toggle="modal" data-bs-target="#addItemModal">
    Adding Items
  </button>
</div>

<div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
    
      <div class="modal-header">
        <h5 class="modal-title" id="addItemModalLabel">Add New Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      
      <div class="modal-body">
        <input id="name" class="input-group p-2" type="text" placeholder="Enter Item name" required><br>
        <input id="price" class="input-group p-2" type="text" placeholder="Enter Item price" required>
      </div>
      <div class="input-group mb-3">
  <input type="file" class="form-control" id="imageUrl"  accept="image/*" required>

</div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-success" onclick="addBtn()">Add Item</button>
      </div>

    </div>
  </div>
</div>


<br><br><hr><br><br>

<div class="container">
  <div class="row main-card" id="main-card">
    <!-- Cards will be appended here -->
  </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app3.js"></script>
</body>
</html>
